# SAAP dev profile — one-command bring-up of the full stack on a laptop
# or shared dev server. Every component here is open-source per P1; see
# open-source-aaa-architecture.md §2 for the license of each.
#
# Usage:
#   docker compose -f deploy/docker-compose.profile-dev.yaml up -d
#
# CPU-only by default (Ollama pulls a 3B model) so this also runs in CI
# (plan §14/§15: "CI needs a CPU-only path"). GPU-backed staging uses a
# separate profile (deploy/docker-compose.profile-agency.yaml, Phase 2+).

name: saap-dev

services:
  postgres:
    # pgvector/pgvector:pg16 is plain postgres:16 with the pgvector
    # extension pre-installed — needed if a deployment binds
    # memory.pgvector instead of memory.qdrant (saap/plugins/memory/pgvector).
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: saap
      POSTGRES_PASSWORD: saap_dev_only
      POSTGRES_DB: saap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saap"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.9.7
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:8-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: saap
      MINIO_ROOT_PASSWORD: saap_dev_only
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin_dev_only
      KC_DB: dev-file
    ports:
      - "8080:8080"

  openbao:
    image: quay.io/openbao/openbao:2.0
    cap_add:
      - IPC_LOCK
    environment:
      BAO_DEV_ROOT_TOKEN_ID: saap-dev-root-token
      BAO_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: server -dev
    ports:
      - "8200:8200"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/11434' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Pulls the CI/dev model on first boot (Qwen 2.5 3B, CPU-friendly).
  # Runs once and exits; safe to re-run (Ollama pull is idempotent).
  ollama-model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - "OLLAMA_HOST=ollama:11434 ollama pull qwen2.5:3b"

  langflow:
    image: langflowai/langflow:latest
    environment:
      LANGFLOW_DATABASE_URL: postgresql://saap:saap_dev_only@postgres:5432/langflow
      LANGFLOW_AUTO_LOGIN: "false"
      LANGFLOW_SUPERUSER: admin
      LANGFLOW_SUPERUSER_PASSWORD: admin_dev_only
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "7860:7860"

  langfuse:
    image: langfuse/langfuse:2
    environment:
      DATABASE_URL: postgresql://saap:saap_dev_only@postgres:5432/langfuse
      NEXTAUTH_SECRET: saap_dev_only_secret
      NEXTAUTH_URL: http://localhost:3000
      SALT: saap_dev_only_salt
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin_dev_only
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"

  gateway:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.gateway
    environment:
      DATABASE_URL: postgresql+asyncpg://saap:saap_dev_only@postgres:5432/saap
      VALKEY_URL: redis://valkey:6379/0
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
      LANGFLOW_URL: http://langflow:7860
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  qdrant_data:
  valkey_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
